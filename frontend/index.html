<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <main class="page-shell">
        <section class="event-panel" aria-labelledby="page-title">
            <div class="event-summary" aria-hidden="true">
                <div class="event-date">
                    <span>PELEC</span>
                    <strong>305</strong>
                </div>
            </div>

            <form class="registration-form" id="registration-form" novalidate>
                <div class="form-heading">
                    <p class="eyebrow">Campus Event</p>
                    <h1 id="page-title">Event Registration</h1>
                </div>

                <div class="status" id="form-status" role="status" aria-live="polite"></div>

                <label class="field">
                    <span>Full name</span>
                    <input id="full_name" name="full_name" type="text" autocomplete="name" placeholder="Juan Dela Cruz" required>
                    <small class="field-error" data-error-for="full_name"></small>
                </label>

                <label class="field">
                    <span>Email</span>
                    <input id="email" name="email" type="email" autocomplete="email" placeholder="name@gmail.com" required>
                    <small class="field-error" data-error-for="email"></small>
                </label>

                <label class="field">
                    <span>Age</span>
                    <input id="age" name="age" type="number" min="18" inputmode="numeric" placeholder="18" required>
                    <small class="field-error" data-error-for="age"></small>
                </label>

                <label class="field">
                    <span>Password</span>
                    <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
                    <small class="field-error" data-error-for="password"></small>
                </label>

                <button class="submit-button" type="submit">Submit Registration</button>
            </form>
        </section>
    </main>
</body>
</html>
